<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.1" />
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="24" dy="24" stdDeviation="0" flood-color="#000000" />
    </filter>
    <filter id="shadow-small">
      <feDropShadow dx="12" dy="12" stdDeviation="0" flood-color="#000000" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#EAE6DF" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Main Card -->
  <rect x="100" y="100" width="1000" height="430" fill="#FFDF00" stroke="#000000" stroke-width="12" rx="20" filter="url(#shadow)" />
  
  <!-- Accent Shapes -->
  <!-- Top Right Burst -->
  <path d="M 1050 50 L 1080 120 L 1150 140 L 1090 190 L 1110 260 L 1040 220 L 970 260 L 990 190 L 930 140 L 1000 120 Z" fill="#FF5252" stroke="#000000" stroke-width="8" filter="url(#shadow-small)" transform="scale(0.8) translate(250, -50)" />
  
  <!-- Bottom Left Badge -->
  <rect x="50" y="480" width="220" height="80" fill="#4B9BFF" stroke="#000000" stroke-width="8" rx="40" transform="rotate(-10 160 520)" filter="url(#shadow-small)" />
  <text x="160" y="530" font-family="'Courier New', Courier, monospace" font-size="32" font-weight="900" fill="#000000" text-anchor="middle" transform="rotate(-10 160 520)">PORTFOLIO</text>

  <!-- Content -->
  <!-- Name / Title -->
  <text x="180" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="900" fill="#000000" letter-spacing="-4">SAWAN.DEV</text>
  
  <!-- Subtitle -->
  <rect x="180" y="280" width="600" height="80" fill="#000000" />
  <text x="210" y="335" font-family="'Courier New', Courier, monospace" font-size="42" font-weight="700" fill="#FFFFFF">SOFTWARE DEVELOPER</text>
  
  <!-- Decorative Elements -->
  <!-- Eye -->
  <circle cx="850" cy="220" r="40" fill="#FFFFFF" stroke="#000000" stroke-width="8" />
  <circle cx="850" cy="220" r="16" fill="#000000" />
  <circle cx="950" cy="220" r="40" fill="#FFFFFF" stroke="#000000" stroke-width="8" />
  <circle cx="950" cy="220" r="16" fill="#000000" />
  
  <!-- Smile -->
  <path d="M 830 300 Q 900 360 970 300" fill="none" stroke="#000000" stroke-width="16" stroke-linecap="round" />

  <!-- Code Window Accent (Bottom Right) -->
  <rect x="750" y="380" width="300" height="100" fill="#FFFFFF" stroke="#000000" stroke-width="8" />
  <rect x="750" y="380" width="300" height="30" fill="#000000" />
  <circle cx="770" cy="395" r="5" fill="#FF5252" />
  <circle cx="790" cy="395" r="5" fill="#FFDF00" />
  <circle cx="810" cy="395" r="5" fill="#4B9BFF" />
  <text x="770" y="445" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="bold" fill="#000000">HELLO WORLD!</text>

</svg>